###############################################################################
###############################################################################

# Clear legacy status-bg/fg so plugin's status-style takes effect
set -gu status-bg
set -gu status-fg


# Quicker Esc response in Vim
# https://stackoverflow.com/questions/13021196/how-do-i-get-vim-to-recognize-esc-key-faster
# set -s escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Default shell
set-option -g default-shell /bin/zsh

# No bells at all
set -g bell-action none

# Lock after 15 minutes
set -g lock-after-time 1800

# Don't keep windows around after they exit
set -g remain-on-exit off

# Automatic window renaming based on shell hooks
set -g automatic-rename on
set -g allow-rename on

# Turn on xterm-keys so that additional function keys get escape sequences
set -g xterm-keys on

# Change the prefix key to Alt-b
set -g prefix M-n

bind M-b send-prefix
bind M-n send-prefix

bind s run 'python3 ~/Repos/dotfiles/.tmux/shift_windows_left.py'

# Vim-line pane navigatione
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Pane resizing (prefix + Shift-hjkl, repeatable)
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Some extra key bindings to select higher numbered windows
bind F1 selectw -t:10
bind F2 selectw -t:11
bind F3 selectw -t:12
bind F4 selectw -t:13
bind F5 selectw -t:14
bind F6 selectw -t:15
bind F7 selectw -t:16
bind F8 selectw -t:17
bind F9 selectw -t:18
bind F10 selectw -t:19
bind F11 selectw -t:20
bind F12 selectw -t:21

# Keys to toggle monitoring activity in a window, and synchronize-panes
bind m set monitor-activity
bind y set synchronize-panes\; display 'synchronize-panes #{?synchronize-panes,on,off}'

# Split/new pane: prompt to SSH if source pane is SSH'd into a remote host (default: no)
bind '"' run-shell 'host="$(tmux show-options -pqv @ssh_host)"; tmux split-window -c "#{pane_current_path}"; [ -n "$host" ] && tmux confirm-before -p "SSH into $host? (y/n)" "send-keys \"ssh $host\" Enter" || true'
bind %   run-shell 'host="$(tmux show-options -pqv @ssh_host)"; tmux split-window -h -c "#{pane_current_path}"; [ -n "$host" ] && tmux confirm-before -p "SSH into $host? (y/n)" "send-keys \"ssh $host\" Enter" || true'
bind c   new-window      -c "~"

# Unbind v for visual block multi-line insert in Vim
unbind v

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'binoymanoj/tmux-minimal-theme'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
